; PlatformIO project — DC Motor Reading (OOP refactor)
; ESP32-C6 + Arduino-core-3.x via pioarduino
; 4 envs:
;   monitor    — USB serial only, no Modbus
;   slave_full — Modbus RTU slave, verbose debug print
;   slave_ref  — Modbus RTU slave, terse debug print
;   slave_tcp  — Modbus TCP slave over Wi-Fi

[platformio]
default_envs = slave_full

[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.30-1/platform-espressif32.zip
board = esp32-c6-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags =
  -std=gnu++17
  -Wall
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
build_unflags = -std=gnu++11
lib_ldf_mode = deep+

[env:monitor]
build_src_filter = +<monitor/>

[env:slave_full]
build_src_filter = +<slave_full/>

[env:slave_ref]
build_src_filter = +<slave_ref/>

[env:slave_tcp]
build_src_filter = +<slave_tcp/>
build_flags =
  ${env.build_flags}
  -DDCMOTOR_ENABLE_MODBUS_TCP=1
  -I$PROJECT_PACKAGES_DIR/framework-arduinoespressif32/libraries/Network/src
; Add credentials under build_flags above when flashing slave_tcp:
;   -DDCMOTOR_WIFI_SSID=\"your-ssid\"
;   -DDCMOTOR_WIFI_PASSWORD=\"your-password\"
